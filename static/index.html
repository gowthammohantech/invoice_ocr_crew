<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Invoice OCR Viewer</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #0f1117;
    color: #e2e8f0;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 20px;
    background: #1a1d27;
    border-bottom: 1px solid #2d3148;
    flex-shrink: 0;
  }
  header h1 { font-size: 15px; font-weight: 600; color: #a5b4fc; letter-spacing: .4px; }

  #invoice-select {
    background: #252836;
    border: 1px solid #3d4166;
    color: #e2e8f0;
    padding: 5px 10px;
    border-radius: 6px;
    font-size: 13px;
    cursor: pointer;
    min-width: 220px;
  }

  .badge {
    display: inline-block;
    padding: 2px 9px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: .5px;
    text-transform: uppercase;
  }
  .badge.pass    { background: #14532d; color: #86efac; }
  .badge.failed  { background: #450a0a; color: #fca5a5; }

  #confidence-badge { font-size: 12px; color: #94a3b8; }

  .spacer { flex: 1; }

  .live-link {
    font-size: 12px; color: #6366f1; text-decoration: none;
    opacity: .8; transition: opacity .15s;
    padding: 5px 12px; border: 1px solid #3d4166; border-radius: 6px;
  }
  .live-link:hover { opacity: 1; background: #1e2235; }

  main {
    display: grid;
    grid-template-columns: 1fr 380px 1fr;
    flex: 1;
    overflow: hidden;
    min-height: 0;
  }

  .panel {
    display: flex;
    flex-direction: column;
    overflow: hidden;
    border-right: 1px solid #2d3148;
  }
  .panel:last-child { border-right: none; }

  .panel-header {
    padding: 8px 14px;
    font-size: 11px; font-weight: 700;
    text-transform: uppercase; letter-spacing: .8px;
    color: #64748b;
    background: #161822;
    border-bottom: 1px solid #2d3148;
    flex-shrink: 0;
  }

  .panel-body { flex: 1; overflow: auto; min-height: 0; }

  /* PDF panel */
  #pdf-frame { width: 100%; height: 100%; border: none; background: #fff; }
  .no-content {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    height: 100%; color: #475569; font-size: 13px; gap: 8px;
  }
  .no-content svg { opacity: .4; }

  /* Data panel */
  #data-panel .panel-body { padding: 14px; }

  .section-title {
    font-size: 10px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 1px;
    color: #6366f1;
    margin: 16px 0 8px;
  }
  .section-title:first-child { margin-top: 0; }

  .field-row {
    display: grid;
    grid-template-columns: 130px 1fr;
    gap: 4px 8px;
    padding: 4px 0;
    border-bottom: 1px solid #1e2235;
    align-items: start;
  }
  .field-label { font-size: 11px; color: #64748b; font-weight: 500; padding-top: 1px; }
  .field-value { font-size: 12px; color: #e2e8f0; word-break: break-word; }
  .field-value.null-val { color: #374151; font-style: italic; }
  .field-value.amount { font-family: "SF Mono", "Fira Code", monospace; color: #a5f3fc; }

  .line-items-table {
    width: 100%; border-collapse: collapse; font-size: 11px; margin-top: 6px;
  }
  .line-items-table th {
    text-align: left; color: #475569; font-weight: 600;
    padding: 4px 6px; border-bottom: 1px solid #2d3148; white-space: nowrap;
  }
  .line-items-table td {
    padding: 5px 6px; border-bottom: 1px solid #1e2235;
    color: #cbd5e1; vertical-align: top;
  }
  .line-items-table tr:last-child td { border-bottom: none; }
  .num-cell { text-align: right; font-family: "SF Mono", monospace; }

  .validation-block { margin-top: 4px; }
  .check-row { display: flex; gap: 6px; align-items: center; padding: 3px 0; font-size: 11px; }
  .check-icon { font-size: 13px; }
  .check-name { color: #94a3b8; flex: 1; }
  .check-detail { font-family: "SF Mono", monospace; font-size: 10px; color: #64748b; }

  /* Reference panel */
  #ref-img { max-width: 100%; display: block; }

  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #2d3148; border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: #3d4166; }

  .empty-state {
    display: flex; align-items: center; justify-content: center;
    height: 100%; color: #374151; font-size: 13px;
  }
</style>
</head>
<body>

<header>
  <h1>Invoice OCR</h1>
  <select id="invoice-select"><option value="">— select invoice —</option></select>
  <span id="status-badge"></span>
  <span id="confidence-badge"></span>
  <div class="spacer"></div>
  <a href="/live" class="live-link">+ New Invoice</a>
</header>

<main>
  <div class="panel" id="pdf-panel">
    <div class="panel-header">Invoice</div>
    <div class="panel-body" style="padding:0">
      <div class="no-content" id="pdf-placeholder">
        <svg width="40" height="40" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
            d="M7 21h10a2 2 0 002-2V9.414a1 1 0 00-.293-.707l-5.414-5.414A1 1 0 0012.586 3H7a2 2 0 00-2 2v14a2 2 0 002 2z"/>
        </svg>
        <span>Select an invoice</span>
      </div>
      <iframe id="pdf-frame" style="display:none"></iframe>
    </div>
  </div>

  <div class="panel" id="data-panel">
    <div class="panel-header">Extracted Data</div>
    <div class="panel-body" id="data-body">
      <div class="empty-state">Select an invoice to view data</div>
    </div>
  </div>

  <div class="panel" id="ref-panel">
    <div class="panel-header" id="ref-panel-title">Reference Image</div>
    <div class="panel-body" id="ref-body">
      <div class="empty-state">Select an invoice to view reference</div>
    </div>
  </div>
</main>

<script>
const API = '';  // same origin

const select         = document.getElementById('invoice-select');
const statusBadge    = document.getElementById('status-badge');
const confBadge      = document.getElementById('confidence-badge');
const pdfFrame       = document.getElementById('pdf-frame');
const pdfPlaceholder = document.getElementById('pdf-placeholder');
const dataBody       = document.getElementById('data-body');
const refBody        = document.getElementById('ref-body');
const refPanelTitle  = document.getElementById('ref-panel-title');

async function loadList() {
  try {
    const res  = await fetch(`${API}/api/invoices`);
    const json = await res.json();
    (json.invoices || []).forEach(({ stem, status, filename }) => {
      const opt = document.createElement('option');
      opt.value              = stem;
      opt.dataset.status     = status;
      opt.dataset.filename   = filename || stem;
      opt.textContent        = `${filename || stem}  (${status})`;
      select.appendChild(opt);
    });
  } catch (e) {
    console.error('Failed to load invoice list', e);
  }
}

select.addEventListener('change', () => {
  const stem     = select.value;
  if (!stem) return;
  const opt      = select.selectedOptions[0];
  const status   = opt?.dataset.status   || '';
  const filename = opt?.dataset.filename || stem;
  loadInvoice(stem, status, filename);
});

async function loadInvoice(stem, status, filename) {
  statusBadge.className   = `badge ${status}`;
  statusBadge.textContent = status;
  confBadge.textContent   = '';

  // PDF
  pdfFrame.src            = `${API}/invoices/${filename}`;
  pdfFrame.style.display  = 'block';
  pdfPlaceholder.style.display = 'none';

  // Data
  try {
    const res  = await fetch(`${API}/api/invoice/${stem}`);
    const data = await res.json();
    confBadge.textContent = data.confidence_score != null
      ? `confidence: ${(data.confidence_score * 100).toFixed(0)}%`
      : '';
    renderData(data);
  } catch (e) {
    dataBody.innerHTML = '<div class="empty-state">Failed to load data</div>';
  }

  // Reference image
  refPanelTitle.textContent = 'Reference Image';
  const refUrl  = `${API}/reference/${stem}_page1_ref.png`;
  const refImg  = new Image();
  refImg.onload = () => {
    refBody.innerHTML  = '';
    refImg.id          = 'ref-img';
    refImg.style.maxWidth = '100%';
    refBody.appendChild(refImg);
  };
  refImg.onerror = () => {
    refBody.innerHTML = '<div class="empty-state">No reference image</div>';
  };
  refImg.src = refUrl;
}

function renderData(d) {
  const el = document.createElement('div');

  const sections = [
    ['Invoice Details', [
      ['Invoice #',     d.invoice_number, false],
      ['Date',          d.invoice_date,   false],
      ['Due Date',      d.due_date,       false],
      ['PO Number',     d.po_number,      false],
      ['Currency',      d.currency,       false],
      ['Payment Terms', d.payment_terms,  false],
    ]],
    ['Vendor', [
      ['Name',    d.vendor_name,    false],
      ['GSTIN',   d.vendor_gstin,   false],
      ['Address', d.vendor_address, false],
    ]],
    ['Customer', [
      ['Name',  d.customer_name,  false],
      ['GSTIN', d.customer_gstin, false],
    ]],
    ['Amounts', [
      ['Subtotal',   d.subtotal,         true],
      ['Discount',   d.discount_amount,  true],
      ['Tax Total',  d.tax_amount,       true],
      ['CGST',       d.cgst_amount,      true],
      ['SGST',       d.sgst_amount,      true],
      ['IGST',       d.igst_amount,      true],
      ['Grand Total',d.grand_total,      true],
    ]],
    ['Bank', [
      ['Bank Name', d.bank_name,       false],
      ['Account #', d.account_number,  false],
      ['IFSC/SWIFT',d.ifsc_swift,      false],
    ]],
  ];

  sections.forEach(([title, rows]) => {
    el.insertAdjacentHTML('beforeend', `<div class="section-title">${title}</div>`);
    rows.forEach(([label, value, isAmt]) => {
      const isNull = value == null || value === 'null';
      const cls    = isNull ? 'null-val' : (isAmt ? 'amount' : '');
      el.insertAdjacentHTML('beforeend', `
        <div class="field-row">
          <span class="field-label">${label}</span>
          <span class="field-value ${cls}">${isNull ? '—' : esc(String(value))}</span>
        </div>`);
    });
  });

  if (d.line_items?.length) {
    el.insertAdjacentHTML('beforeend', `<div class="section-title">Line Items</div>`);
    const tbl = document.createElement('table');
    tbl.className = 'line-items-table';
    tbl.innerHTML = `<thead><tr>
      <th>Description</th><th>HSN</th>
      <th class="num-cell">Qty</th><th class="num-cell">Unit Price</th>
      <th class="num-cell">Tax %</th><th class="num-cell">Amount</th>
    </tr></thead>`;
    const tbody = document.createElement('tbody');
    d.line_items.forEach(item => {
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td>${esc(item.description || '—')}</td>
        <td>${item.hsn_sac_code || '—'}</td>
        <td class="num-cell">${item.quantity ?? '—'}</td>
        <td class="num-cell">${item.unit_price != null ? fmt(item.unit_price) : '—'}</td>
        <td class="num-cell">${item.tax_rate   != null ? item.tax_rate + '%'  : '—'}</td>
        <td class="num-cell">${item.amount     != null ? fmt(item.amount)     : '—'}</td>`;
      tbody.appendChild(tr);
    });
    tbl.appendChild(tbody);
    el.appendChild(tbl);
  }

  if (d.validation) {
    el.insertAdjacentHTML('beforeend', `<div class="section-title">Validation</div>`);
    const block = document.createElement('div');
    block.className = 'validation-block';
    (d.validation.checks || []).forEach(check => {
      const icon   = check.passed ? '✅' : '❌';
      const detail = check.delta != null
        ? `expected ${fmt(check.expected)} · got ${fmt(check.computed)} · Δ${fmt(check.delta)}`
        : '';
      block.insertAdjacentHTML('beforeend', `
        <div class="check-row">
          <span class="check-icon">${icon}</span>
          <span class="check-name">${esc(check.name)}</span>
          <span class="check-detail">${detail}</span>
        </div>`);
    });
    el.appendChild(block);
  }

  dataBody.innerHTML = '';
  dataBody.appendChild(el);
}

function fmt(n) {
  if (n == null) return '—';
  return Number(n).toLocaleString('en-IN', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}
function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

loadList();
</script>
</body>
</html>
